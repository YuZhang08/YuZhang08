<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#05060A"/>
      <stop offset="1" stop-color="#0D1117"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(600 160) rotate(90) scale(180 520)">
      <stop stop-color="#7C3AED" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="particleGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(0 0) rotate(90) scale(12)">
      <stop stop-color="#E9D5FF"/>
      <stop offset="1" stop-color="#A855F7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="titleGradient" x1="350" y1="120" x2="860" y2="170" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F5EFFF">
        <animate attributeName="stop-color" values="#F5EFFF;#D8B4FE;#C084FC;#F5EFFF" dur="5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="45%" stop-color="#C084FC">
        <animate attributeName="stop-color" values="#C084FC;#A855F7;#E879F9;#C084FC" dur="5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#7C3AED">
        <animate attributeName="stop-color" values="#7C3AED;#9333EA;#A855F7;#7C3AED" dur="5s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="subtitleGradient" x1="450" y1="188" x2="760" y2="214" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F3E8FF">
        <animate attributeName="stop-color" values="#F3E8FF;#D8B4FE;#F3E8FF" dur="4.6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#A855F7">
        <animate attributeName="stop-color" values="#A855F7;#C084FC;#9333EA;#A855F7" dur="4.6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="textGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.2" result="blur1"/>
      <feColorMatrix in="blur1" type="matrix" values="1 0 0 0 0.66 0 1 0 0 0.33 0 0 1 0 0.97 0 0 0 1 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
      </feMerge>
    </filter>
    <filter id="textGlowStrong" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4.2" result="blur1"/>
      <feColorMatrix in="blur1" type="matrix" values="1 0 0 0 0.60 0 1 0 0 0.20 0 0 1 0 0.90 0 0 0 1 0" result="glow1"/>
      <feGaussianBlur in="glow1" stdDeviation="9" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="glow1"/>
      </feMerge>
    </filter>
    <style>
      .line {
        stroke: rgba(124, 58, 237, 0.22);
        stroke-width: 1.2;
        animation: pulse 5s ease-in-out infinite;
      }
      .line2 {
        stroke: rgba(168, 85, 247, 0.18);
        stroke-width: 1;
        animation: pulse 7s ease-in-out infinite reverse;
      }
      .node {
        fill: #A855F7;
        opacity: 0.88;
        animation: nodeFloat 6s ease-in-out infinite;
      }
      .node-sm {
        fill: #7C3AED;
        opacity: 0.75;
        animation: nodeFloat 8s ease-in-out infinite reverse;
      }
      .spark {
        fill: #E9D5FF;
        opacity: 0.85;
        animation: twinkle 2.8s ease-in-out infinite;
      }
      .title {
        font: 700 56px 'Segoe UI', Arial, sans-serif;
        fill: url(#titleGradient);
        letter-spacing: 0.5px;
      }
      .title-glow {
        font: 700 56px 'Segoe UI', Arial, sans-serif;
        fill: url(#titleGradient);
        filter: url(#textGlowStrong);
        letter-spacing: 0.5px;
        opacity: 0.98;
      }
      .subtitle {
        font: 600 26px 'Segoe UI', Arial, sans-serif;
        fill: url(#subtitleGradient);
      }
      .subtitle-glow {
        font: 600 26px 'Segoe UI', Arial, sans-serif;
        fill: url(#subtitleGradient);
        filter: url(#textGlow);
        opacity: 0.92;
      }
      .caption {
        font: 500 18px 'Segoe UI', Arial, sans-serif;
        fill: #D8B4FE;
        opacity: 0.92;
      }
      @keyframes twinkle {
        0%, 100% { opacity: 0.15; transform: scale(0.9); }
        50% { opacity: 1; transform: scale(1.15); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.15; }
        50% { opacity: 0.95; }
      }
      @keyframes nodeFloat {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-5px); }
      }
    </style>
  </defs>

  <rect width="1200" height="320" rx="18" fill="url(#bg)"/>
  <rect width="1200" height="320" rx="18" fill="url(#glowA)"/>

  <g opacity="0.9">
    <line class="line" x1="70" y1="58" x2="178" y2="188"/>
    <line class="line2" x1="178" y1="188" x2="316" y2="140"/>
    <line class="line" x1="316" y1="140" x2="438" y2="78"/>
    <line class="line2" x1="438" y1="78" x2="514" y2="226"/>
    <line class="line" x1="514" y1="226" x2="668" y2="170"/>
    <line class="line2" x1="668" y1="170" x2="808" y2="106"/>
    <line class="line" x1="808" y1="106" x2="960" y2="174"/>
    <line class="line2" x1="960" y1="174" x2="1082" y2="86"/>
    <line class="line" x1="844" y1="234" x2="960" y2="174"/>
    <line class="line2" x1="694" y1="246" x2="844" y2="234"/>
    <line class="line" x1="566" y1="104" x2="668" y2="170"/>
    <line class="line2" x1="968" y1="248" x2="1082" y2="86"/>
  </g>

  <g>
    <circle class="node" cx="70" cy="58" r="8">
      <animate attributeName="r" values="7;9.2;7" dur="2.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.55;1;0.55" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle class="node-sm" cx="178" cy="188" r="4.5">
      <animate attributeName="opacity" values="0.35;0.9;0.35" dur="3.6s" repeatCount="indefinite"/>
    </circle>
    <circle class="node" cx="316" cy="140" r="7">
      <animate attributeName="r" values="6.4;8.4;6.4" dur="3.2s" repeatCount="indefinite"/>
    </circle>
    <circle class="node-sm" cx="438" cy="78" r="3.8">
      <animate attributeName="opacity" values="0.4;0.9;0.4" dur="2.7s" repeatCount="indefinite"/>
    </circle>
    <circle class="node" cx="514" cy="226" r="6.5">
      <animate attributeName="r" values="6;7.8;6" dur="2.9s" repeatCount="indefinite"/>
    </circle>
    <circle class="node-sm" cx="566" cy="104" r="4.2">
      <animate attributeName="opacity" values="0.35;0.85;0.35" dur="3.1s" repeatCount="indefinite"/>
    </circle>
    <circle class="node" cx="668" cy="170" r="7.5">
      <animate attributeName="r" values="7;9.4;7" dur="2.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.55;1;0.55" dur="2.6s" repeatCount="indefinite"/>
    </circle>
    <circle class="node-sm" cx="808" cy="106" r="4.2">
      <animate attributeName="opacity" values="0.4;0.9;0.4" dur="3.8s" repeatCount="indefinite"/>
    </circle>
    <circle class="node" cx="844" cy="234" r="6.6">
      <animate attributeName="r" values="6.1;8.1;6.1" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle class="node-sm" cx="960" cy="174" r="4.6">
      <animate attributeName="opacity" values="0.35;0.9;0.35" dur="3.3s" repeatCount="indefinite"/>
    </circle>
    <circle class="node" cx="968" cy="248" r="5.8">
      <animate attributeName="r" values="5.4;6.8;5.4" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle class="node-sm" cx="1082" cy="86" r="4.2">
      <animate attributeName="opacity" values="0.35;0.9;0.35" dur="2.4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g>
    <circle class="spark" cx="132" cy="112" r="1.8">
      <animate attributeName="opacity" values="0.15;1;0.15" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle class="spark" cx="228" cy="82" r="1.6">
      <animate attributeName="opacity" values="0.15;1;0.15" dur="2.1s" begin="0.4s" repeatCount="indefinite"/>
    </circle>
    <circle class="spark" cx="382" cy="218" r="1.5">
      <animate attributeName="opacity" values="0.15;1;0.15" dur="2.3s" begin="0.8s" repeatCount="indefinite"/>
    </circle>
    <circle class="spark" cx="610" cy="86" r="1.8">
      <animate attributeName="opacity" values="0.15;1;0.15" dur="1.9s" begin="0.2s" repeatCount="indefinite"/>
    </circle>
    <circle class="spark" cx="730" cy="250" r="1.6">
      <animate attributeName="opacity" values="0.15;1;0.15" dur="2.4s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle class="spark" cx="902" cy="74" r="1.7">
      <animate attributeName="opacity" values="0.15;1;0.15" dur="2s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
    <circle class="spark" cx="1024" cy="210" r="1.5">
      <animate attributeName="opacity" values="0.15;1;0.15" dur="2.2s" begin="1.2s" repeatCount="indefinite"/>
    </circle>
    <circle class="spark" cx="1112" cy="158" r="1.7">
      <animate attributeName="opacity" values="0.15;1;0.15" dur="1.7s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g opacity="0.8">
    <circle cx="70" cy="58" r="16" fill="url(#particleGlow)"/>
    <circle cx="316" cy="140" r="18" fill="url(#particleGlow)"/>
    <circle cx="668" cy="170" r="16" fill="url(#particleGlow)"/>
    <circle cx="844" cy="234" r="14" fill="url(#particleGlow)"/>
    <circle cx="1082" cy="86" r="12" fill="url(#particleGlow)"/>
  </g>

  <text x="600" y="150" text-anchor="middle" class="title-glow">Hey there, I'm Yu Zhang
    <animate attributeName="opacity" values="0.88;1;0.9;0.98;0.88" dur="3.4s" repeatCount="indefinite"/>
  </text>
  <text x="600" y="150" text-anchor="middle" class="title">Hey there, I'm Yu Zhang
    <animate attributeName="opacity" values="0.94;1;0.96;1;0.94" dur="3.4s" repeatCount="indefinite"/>
  </text>
  <text x="600" y="202" text-anchor="middle" class="subtitle-glow">CS &amp; Linguistics @ UCLA</text>
  <text x="600" y="202" text-anchor="middle" class="subtitle">CS &amp; Linguistics @ UCLA</text>
  <text x="600" y="238" text-anchor="middle" class="caption">Exploring AI &amp; building real-world apps</text>
</svg>
